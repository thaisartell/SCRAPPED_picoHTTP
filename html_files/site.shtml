<!DOCTYPE html>
<html>
    <head>
        <title>Pico 2 W Webserver</title>
    </head>
    <body>
        <h1>Hello world!</h1>
        <p>Sync state: <span id="sync-state">Loading...</span></p>
        <p id="sync-message">Checking status...</p>
        <button id="sync-button" type="button">Sync Folder Now</button>
        <script>
            const syncButton = document.getElementById("sync-button");
            const syncState = document.getElementById("sync-state");
            const syncMessage = document.getElementById("sync-message");

            async function refreshStatus() {
                try {
                    const response = await fetch("/status", { cache: "no-store" });
                    if (!response.ok) {
                        throw new Error("Status unavailable");
                    }

                    const status = await response.json();
                    syncState.textContent = status.state;
                    syncMessage.textContent = status.message;
                    syncButton.disabled = status.state !== "IDLE";
                } catch (error) {
                    syncState.textContent = "ERROR";
                    syncMessage.textContent = "Status unavailable";
                    syncButton.disabled = false;
                }
            }

            syncButton.addEventListener("click", async () => {
                syncButton.disabled = true;

                try {
                    await fetch("/sync.cgi", { cache: "no-store" });
                } catch (error) {
                }

                refreshStatus();
            });

            refreshStatus();
            setInterval(refreshStatus, 1000);
        </script>
    </body>
</html>
